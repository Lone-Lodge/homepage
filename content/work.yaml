- title: "Storyteller"
  role: "Main product"
  description: "A narrative roguelike where story and system are one. Every choice leaves a mark — every card a promise."
  year: "In development"
  tags: ["Unity", "Narrative", "Roguelike", "Card System"]
  details: |
    Storyteller is our flagship — a narrative roguelike built around an interactive book structure. Players navigate branching stories, using a limited hand of character-class cards at critical moments to shape direction and consequence.

    Blood Mage, Rogue, Necromancer, Oracle — each class plays differently, each run tells a different story. No two runs are ever the same.

    The platform vision extends beyond the game itself: UGC tools, community-created stories, creator economics and an open ecosystem for builders. We're building a world, not just a game.

- title: "Nova UI Ecosystem"
  role: "Developer tools"
  description: "Production-ready UI plugins for Unreal Engine. Zero dependencies, fully modular."
