- num: "01"
  title: "Health first"
  desc: "The person behind the screen always matters more than the project in front of it. No exceptions."

- num: "02"
  title: "Flat structure"
  desc: "No senior/junior matrices. Similar pay. Everyone works toward the same goal."

- num: "03"
  title: "No crunch"
  desc: "Crunch is a planning failure, not a team requirement. We build at a sustainable pace."

- num: "04"
  title: "AI as amplifier"
  desc: "We use AI to expand creativity and cut friction. Human judgment and craft remain the core."

- num: "05"
  title: "Passion driven"
  desc: "We work on things we genuinely believe in. If the spark is gone, that's a signal — not a weakness."

- num: "06"
  title: "Stuga feeling"
  desc: "How we ever grow, it should still feel small, warm and personal. Not a corporate office on the internet."
