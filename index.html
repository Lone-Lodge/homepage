<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lone Lodge Studios — an independent craft studio building narrative games and tools with passion, openness, and community at the centre.">
  <meta property="og:title" content="Lone Lodge Studios">
  <meta property="og:description" content="We build what we believe in.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lonelodgestudios.com">
  <title>Lone Lodge Studios</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="noise-overlay">

  <div id="scroll-progress"></div>

  <nav id="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <div class="nav-links" id="nav-links">
        <button class="nav-btn active" data-section="home">Home</button>
        <button class="nav-btn" data-section="work">Storyteller</button>
        <button class="nav-btn" data-section="about">About</button>
        <button class="nav-btn" data-section="open">Open</button>
        <button class="nav-btn" data-section="contact">Contact</button>
      </div>
      <div class="nav-right">
        <button id="theme-toggle" aria-label="Toggle theme">
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="mobile-menu-btn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="nav-underline-track">
      <div class="nav-underline" id="nav-underline"></div>
    </div>
  </nav>

  <div id="mobile-menu">
    <button id="mobile-close" aria-label="Close menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="mobile-links" id="mobile-links"></div>
  </div>

  <main>
    <section id="home" class="hero-section">
      <div id="hero-glow" class="hero-glow"></div>
      <div class="hero-content">
        <h1 id="hero-headline" aria-label="We build what we believe in."></h1>
        <p id="hero-subline" class="hero-subline"></p>
        <div class="hero-scroll" id="hero-scroll">
          <span class="scroll-label">scroll</span>
          <div class="scroll-line-wrap"><div class="scroll-line"></div></div>
        </div>
      </div>
    </section>

    <section id="work" class="section">
      <div class="section-inner">
        <h2 class="section-label anim-x">STORYTELLER</h2>
        <div id="work-cards"></div>
      </div>
    </section>

    <section id="about" class="section">
      <div class="section-inner">
        <h2 class="section-label anim-x">ABOUT</h2>
        <div id="about-paragraphs" class="about-paragraphs"></div>
        <div class="about-footer anim-fade">
          <p class="about-personal" id="about-personal"></p>
          <div class="interests" id="interests"></div>
        </div>
      </div>
    </section>

    <section id="open" class="section open-bg">
      <div class="section-inner">
        <h2 class="section-label anim-x">OPEN BY DEFAULT</h2>
        <div id="open-grid" class="open-grid"></div>
      </div>
    </section>

    <section id="contact" class="section contact-section">
      <div class="section-inner">
        <h2 class="section-label anim-x">GET IN TOUCH</h2>
        <h3 class="contact-headline anim-up">The door is always open.</h3>
        <div id="contact-links" class="contact-links"></div>
        <div class="contact-footer anim-fade">
          <p>Lone Lodge Studios · Göteborg, Sweden · Remote-first</p>
        </div>
      </div>
    </section>
  </main>

  <button id="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
